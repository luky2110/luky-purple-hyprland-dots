##############################
### Luky's Hyprland Config ###
##############################
# Created: 19.01.2026
#
# Optimized for Arch
#
# Last Update: 25.03.2026
#
# Written by Luky
#
# If you need help: https://www.youtube.com/@lukyboy2110


####################
### Startup Apps ###
####################

#Change the Cursor theme here
exec-once = hyprctl setcursor Bibata-Modern-Ice 24

exec-once = waybar
exec-once = hyprpaper

#################
### Variables ###
#################

# This sets up variables to shorten the name
# Usage:
# $name = command

#If you use different programs just replace them with the binary name
$term 		= alacritty
$browser 	= zen-browser 
$files 		= thunar
$menu 		= wofi --show drun
$mod 	  	= SUPER
$screenie = hyprshot -m region -o ~/Pictures/Screenshots

###############################
### Environnement Variables ###
###############################

# Remove the # of the two following lines if you use NVIDIA
#env = __GLX_VENDOR_LIBRARY_NAME,nvidia
#env = GBM_BACKEND,nvidia-drm

# Run electron apps in wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto

#Fix for QT on wayland
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

#####################
### Monitor Setup ###
#####################

# This allows you to setup a screen as you desire (Resolution/Refresh Rate/Position/Screen Scaling)
# Usage:
# monitor="name","length"x"height"@"rate","Position1"x"Position2","scale"

monitor = 

###################
### Keybindings ###
###################

# This allows you to add keybindings to a certain command
# Usage:
# bind = "key", "key", hyprctl-command, command

bind = $mod, Q,        killactive,
bind = $mod, B,        exec,           $browser
bind = $mod, RETURN,   exec,           $term
bind = $mod, TAB,      togglefloating,
bind = $mod, SPACE,    exec,           $menu
bind = $mod, E,        exec,           $files
bind = $mod, F,        fullscreen,
bind = $mod, J,        togglesplit,
bind = $mod, S,        exec,           $screenie
bind = ,     PRINT,    exec,           $screenie
bind = $mod SHIFT, E,  exec,           command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# Move focus (Vim-like)
bind = $mod, H,       movefocus,      l
bind = $mod, J,       movefocus,      d
bind = $mod, K,       movefocus,      u
bind = $mod, L,       movefocus,      r

# Switch workspace
bind = $mod, 1,       workspace,      1
bind = $mod, 2,       workspace,      2
bind = $mod, 3,       workspace,      3
bind = $mod, 4,       workspace,      4
bind = $mod, 5,       workspace,      5
bind = $mod, 6,       workspace,      6
bind = $mod, 7,       workspace,      7
bind = $mod, 8,       workspace,      8
bind = $mod, 9,       workspace,      9
bind = $mod, 0,       workspace,     10

# Switch workspace with app
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace,10

# Move workspace with mousewheel

bind = $mod, mouse_down , workspace, e+1
bind = $mod, mouse_up   , workspace, e-1

# Resize & drag windows with mouse buttons

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizeactive

# Change volume with standart volume keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, 	      exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, 	  exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Change screen brightness (using brightnessctl)
bindel = ,XF86MonBrightnessUp, 		exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, 	exec, brightnessctl -e4 -n2 set 5%-

# Media keys (using playerctl)
bindl = , XF86AudioNext, 	exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, 	exec, playerctl play-pause
bindl = , XF86AudioPrev, 	exec, playerctl previous

#############
### Input ###
#############

input {
    kb_layout =
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

# Per device config example
#  device {
#     name = epic-mouse-v1
#     sensitivity = -0.5
# }

##############
### Design ###
##############

general {
  gaps_in = 6
  gaps_out = 20
  border_size = 2

  col.active_border 	= rgba(153,51,255,1) rgba(128,0,128,1) rgba(255,51,255,1) 45deg
  col.inactive_border 	= rgba(51,0,51,1)

  resize_on_border = false

  allow_tearing = false

  layout = dwindle

}

decoration {
  rounding = 		2
  rounding_power = 	10

  active_opacity    = 0.85
  inactive_opacity  = 0.80

  blur {
    enabled = true
    size = 	5
    passes = 	2

    vibrancy = 0.1696

  }
}

animations {
    enabled = yes

# Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
#            NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

# Default animations, see https://wiki.hypr.land/Configuring/Animations/
#               NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     1.79,  easeOutQuint
    animation = windowsIn,     1,     3.1,   easeOutQuint, popin 0%
    animation = windowsOut,    1,     0.80,  linear,       popin 0%
#    animation = fadeIn,        1,     1.73,  almostLinear
#    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     1.53,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     3.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}
